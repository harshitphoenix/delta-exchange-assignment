<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12141a"/>
      <stop offset="100%" stop-color="#0c0e12"/>
    </linearGradient>
  </defs>
  <rect width="920" height="640" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" fill="#f3f4f6" font-size="18" font-weight="600">Trades Panel  Component Communication</text>
  <text x="460" y="54" text-anchor="middle" fill="#9ca3af" font-size="12">features/trades · engine ’ snapshot store ’ virtualized tape</text>

  <text x="24" y="88" fill="#6b7280" font-size="10" font-weight="600">TRANSPORT</text>
  <text x="24" y="188" fill="#6b7280" font-size="10" font-weight="600">PANEL</text>
  <text x="24" y="308" fill="#6b7280" font-size="10" font-weight="600">ENGINE</text>
  <text x="24" y="428" fill="#6b7280" font-size="10" font-weight="600">STATE</text>
  <text x="24" y="528" fill="#6b7280" font-size="10" font-weight="600">VIEW</text>

  <rect x="120" y="72" width="200" height="56" rx="8" fill="#1a1d26" stroke="#eab308" stroke-width="1.5"/>
  <text x="220" y="96" text-anchor="middle" fill="#fde047" font-size="12" font-weight="600">StressWsClient</text>
  <text x="220" y="114" text-anchor="middle" fill="#9ca3af" font-size="10">on('all_trades') RAF batch</text>

  <rect x="680" y="72" width="200" height="56" rx="8" fill="#1e1b4b" stroke="#818cf8"/>
  <text x="780" y="96" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">useFocusStore</text>
  <text x="780" y="114" text-anchor="middle" fill="#9ca3af" font-size="10">focusedSymbol</text>

  <rect x="340" y="168" width="240" height="96" rx="8" fill="#2a1515" stroke="#ef4444" stroke-width="2"/>
  <text x="460" y="196" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="600">Trades.tsx</text>
  <text x="460" y="216" text-anchor="middle" fill="#9ca3af" font-size="10">subscribe / unsubscribe · WS handler</text>
  <text x="460" y="232" text-anchor="middle" fill="#f87171" font-size="10">engine.process(messages)</text>
  <text x="460" y="248" text-anchor="middle" fill="#9ca3af" font-size="10">threshold ’ setLargeTradeThreshold</text>

  <rect x="120" y="188" width="180" height="56" rx="8" fill="#1a1d26" stroke="#6b7280"/>
  <text x="210" y="212" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="600">Threshold Input</text>
  <text x="210" y="230" text-anchor="middle" fill="#9ca3af" font-size="10">useDeferredValue</text>

  <rect x="300" y="288" width="320" height="72" rx="8" fill="#241010" stroke="#dc2626" stroke-width="2"/>
  <text x="460" y="316" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">TradesEngine (singleton)</text>
  <text x="460" y="336" text-anchor="middle" fill="#9ca3af" font-size="10">normalize ’ ring buffer ’ aggregateInto ’ stats</text>

  <rect x="100" y="300" width="120" height="48" rx="6" fill="#1a1d26" stroke="#374151"/>
  <text x="160" y="320" text-anchor="middle" fill="#d1d5db" font-size="10">normalization</text>
  <text x="160" y="336" text-anchor="middle" fill="#6b7280" font-size="9">wire ’ Trade</text>

  <rect x="240" y="300" width="100" height="48" rx="6" fill="#1a1d26" stroke="#374151"/>
  <text x="290" y="320" text-anchor="middle" fill="#d1d5db" font-size="10">ring-buffer</text>
  <text x="290" y="336" text-anchor="middle" fill="#6b7280" font-size="9">cap 500</text>

  <rect x="580" y="300" width="120" height="48" rx="6" fill="#1a1d26" stroke="#374151"/>
  <text x="640" y="320" text-anchor="middle" fill="#d1d5db" font-size="10">aggregation</text>
  <text x="640" y="336" text-anchor="middle" fill="#6b7280" font-size="9">100 ms window</text>

  <rect x="720" y="300" width="120" height="48" rx="6" fill="#1a1d26" stroke="#374151"/>
  <text x="780" y="320" text-anchor="middle" fill="#d1d5db" font-size="10">rolling-stats</text>
  <text x="780" y="336" text-anchor="middle" fill="#6b7280" font-size="9">60 s · 1 Hz</text>

  <rect x="340" y="408" width="240" height="52" rx="8" fill="#1a1d26" stroke="#f87171"/>
  <text x="460" y="432" text-anchor="middle" fill="#fecaca" font-size="12" font-weight="600">trades.store</text>
  <text x="460" y="450" text-anchor="middle" fill="#9ca3af" font-size="10">setTradesSnapshot · TradesSnapshot</text>

  <rect x="640" y="408" width="160" height="52" rx="8" fill="#1a1d26" stroke="#6b7280"/>
  <text x="720" y="438" text-anchor="middle" fill="#e5e7eb" font-size="11">useTrades</text>

  <rect x="120" y="508" width="200" height="56" rx="8" fill="#1a1d26" stroke="#6b7280"/>
  <text x="220" y="532" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="600">TradesStats</text>
  <text x="220" y="550" text-anchor="middle" fill="#9ca3af" font-size="10">snapshot.stats</text>

  <rect x="360" y="500" width="440" height="72" rx="8" fill="#1a1d26" stroke="#ef4444"/>
  <text x="580" y="528" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Virtualized TradeRow list</text>
  <text x="580" y="546" text-anchor="middle" fill="#9ca3af" font-size="10">getItemKey: trade.id · memo(TradeRow) · isLarge from engine</text>
  <text x="580" y="562" text-anchor="middle" fill="#6b7280" font-size="10">footer: scrollToIndex(0) jump to latest</text>

  <!-- Arrows -->
  <line x1="220" y1="128" x2="400" y2="168" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="280" y="148" fill="#f87171" font-size="9">messages[]</text>

  <line x1="780" y1="128" x2="520" y2="168" stroke="#818cf8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="210" y1="244" x2="340" y2="220" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="250" y="228" fill="#9ca3af" font-size="9">threshold</text>

  <line x1="460" y1="264" x2="460" y2="288" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <line x1="220" y1="324" x2="300" y2="312" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="324" x2="320" y2="312" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="324" x2="580" y2="312" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="324" x2="720" y2="312" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="460" y1="360" x2="460" y2="408" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="472" y="388" fill="#9ca3af" font-size="9">setTradesSnapshot</text>

  <line x1="720" y1="460" x2="580" y2="500" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="720" y1="460" x2="220" y2="508" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
